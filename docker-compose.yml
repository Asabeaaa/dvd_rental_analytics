services:
  postgres:
    image: postgres:18
    container_name: dvd_rental_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./postgres/backups:/backups
    networks:
      - dvd_rental_network

  pgadmin:
    image: dpage/pgadmin4:9.15
    container_name: dvd_rental_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/storage:/var/lib/pgadmin/storage
      - ./postgres/backups:/backups
    depends_on:
      - postgres
    networks:
      - dvd_rental_network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  dvd_rental_network:
    driver: bridge